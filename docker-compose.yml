version: '3.9'  # Still supported, but optional

services:
  bot_creator:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app  # Good for live reload during development
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    # Optional: Enable BuildKit cache for faster builds in the future
    # build:
    #   context: .
    #   dockerfile: Dockerfile.app
    #   cache_from:
    #     - type=local,src=/tmp/.buildx-cache
    #   cache_to:
    #     - type=local,dest=/tmp/.buildx-cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevents host node_modules from overwriting container's
    working_dir: /app
    command: ["npm", "run", "dev"]

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Optional: Persist models if you pull big ones

volumes:
  ollama_data:
